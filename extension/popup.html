<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroUI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container" role="main" aria-label="NeuroUI Accessibility Controls">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo-group">
        <img src="icons/icon48.png" alt="NeuroUI" class="logo-icon" width="28" height="28">
        <h1>NeuroUI</h1>
      </div>
      <span class="version-badge">v1.2</span>
    </header>

    <!-- Status Bar -->
    <div class="status-bar" id="status-bar" role="status" aria-live="polite">
      <span class="status-dot" id="status-dot" aria-hidden="true"></span>
      <span class="status-text" id="status-text">Inactive</span>
    </div>

    <!-- Ad Blocker Card -->
    <div class="adblock-card">
      <div class="adblock-info">
        <span class="adblock-icon">🛡️</span>
        <div class="adblock-text">
          <span class="adblock-title">Ad Blocker</span>
          <span class="adblock-stats" id="adblock-stats">0 ads blocked</span>
        </div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="adblock-toggle" checked aria-label="Toggle ad blocker">
        <span class="toggle-slider" aria-hidden="true"></span>
      </label>
    </div>

    <!-- CLS Score Display -->
    <div class="cls-display" id="cls-display" style="display: none;" role="region" aria-label="Cognitive Load Scores" aria-live="polite">
      <div class="cls-card cls-before">
        <span class="cls-label">Before</span>
        <span class="cls-value" id="cls-before-value">—</span>
      </div>
      <div class="cls-arrow">→</div>
      <div class="cls-card cls-after">
        <span class="cls-label">After</span>
        <span class="cls-value" id="cls-after-value">—</span>
      </div>
    </div>

    <!-- Profile Selection -->
    <section class="profile-section">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px;">
        <h2>Cognitive Profile</h2>
        <a href="#" id="quiz-link" style="font-size: 11px; color: #6366f1; text-decoration: none; cursor: pointer;">🧩 Find my profile</a>
      </div>
      <div class="profile-grid">
        <button class="profile-btn" id="btn-adhd" data-profile="adhd" role="radio" aria-checked="false" aria-label="ADHD Focus Mode">
          <span class="profile-emoji" aria-hidden="true">⚡</span>
          <span class="profile-name">ADHD</span>
          <span class="profile-desc">Focus & clarity</span>
        </button>
        <button class="profile-btn" id="btn-dyslexia" data-profile="dyslexia" role="radio" aria-checked="false" aria-label="Dyslexia Reading Mode">
          <span class="profile-emoji" aria-hidden="true">📖</span>
          <span class="profile-name">Dyslexia</span>
          <span class="profile-desc">Spacing & fonts</span>
        </button>
        <button class="profile-btn" id="btn-autism" data-profile="autism" role="radio" aria-checked="false" aria-label="Autism Calm Mode">
          <span class="profile-emoji" aria-hidden="true">🧘</span>
          <span class="profile-name">Autism</span>
          <span class="profile-desc">Calm & literal</span>
        </button>
        <button class="profile-btn" id="btn-custom" data-profile="custom" role="radio" aria-checked="false" aria-label="Custom Profile">
          <span class="profile-emoji" aria-hidden="true">⚙️</span>
          <span class="profile-name">Custom</span>
          <span class="profile-desc">Your settings</span>
        </button>
      </div>
    </section>

    <!-- Fine-tune Settings (collapsible, available for ALL profiles) -->
    <div class="finetune-toggle" id="finetune-toggle">
      <span class="finetune-icon">⚙️</span>
      <span>Fine-tune settings</span>
      <span class="finetune-arrow" id="finetune-arrow">▸</span>
    </div>
    <section class="custom-settings" id="custom-settings" style="display: none;">
      <div class="setting-row">
        <label for="simplification-level">Text Simplification</label>
        <input type="range" id="simplification-level" min="1" max="3" value="2">
        <span class="setting-value" id="simplification-value">2</span>
      </div>
      <div class="setting-row">
        <label for="distraction-level">Distraction Removal</label>
        <select id="distraction-level">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="setting-row">
        <label for="spacing-multiplier">Spacing</label>
        <input type="range" id="spacing-multiplier" min="0.5" max="3.0" step="0.1" value="1.2">
        <span class="setting-value" id="spacing-value">1.2×</span>
      </div>
      <div class="setting-row">
        <label for="font-size">Font Size</label>
        <input type="range" id="font-size" min="12" max="28" step="1" value="16">
        <span class="setting-value" id="font-size-value">16px</span>
      </div>
      <div class="setting-row">
        <label for="color-mode">Color Mode</label>
        <select id="color-mode">
          <option value="original">Original</option>
          <option value="muted">Muted</option>
          <option value="warm">Warm</option>
          <option value="high_contrast">High Contrast</option>
        </select>
      </div>
    </section>

    <!-- Action Buttons -->
    <div class="action-group" role="group" aria-label="Actions">
      <button class="btn-primary" id="btn-activate" aria-label="Activate NeuroUI">
        <span class="btn-icon" aria-hidden="true">🧠</span> Activate NeuroUI
      </button>
      <div class="shortcut-hint" aria-label="Keyboard shortcut">
        <kbd>Alt</kbd> + <kbd>N</kbd> to toggle from any page
      </div>
      <button class="btn-secondary" id="btn-heatmap" title="Visualize cognitive load across the page" aria-label="Toggle Cognitive Heatmap">
        <span class="btn-icon" aria-hidden="true">🔥</span> Cognitive Heatmap
      </button>
      <button class="btn-secondary" id="btn-reset" style="display: none;" aria-label="Reset page to original">
        <span class="btn-icon" aria-hidden="true">↩️</span> Reset Page
      </button>
    </div>

    <!-- Processing Metrics (shown after activation) -->
    <div class="metrics-bar" id="metrics-bar" style="display: none;" role="status" aria-live="polite">
      <span class="metrics-icon">⚡</span>
      <span class="metrics-text" id="metrics-text"></span>
    </div>

    <!-- Visual Enhancements -->
    <section class="visual-section" aria-label="Visual Enhancements">
      <h2>Visual Enhancements</h2>
      <div class="feature-grid" role="toolbar" aria-label="Visual feature toggles">
        <button class="feature-btn" id="btn-bionic" title="Bold first half of each word for guided reading" aria-pressed="false">
          <span class="feature-icon" aria-hidden="true">📖</span>
          <span class="feature-label">Bionic</span>
        </button>
        <button class="feature-btn" id="btn-minimap" title="Show cognitive difficulty zones on scrollbar" aria-pressed="false">
          <span class="feature-icon" aria-hidden="true">📊</span>
          <span class="feature-label">CLS Map</span>
        </button>
        <button class="feature-btn" id="btn-reader" title="Clean single-column reading view" aria-pressed="false">
          <span class="feature-icon" aria-hidden="true">📄</span>
          <span class="feature-label">Reader</span>
        </button>
        <button class="feature-btn" id="btn-progress" title="Show reading progress bar at top" aria-pressed="false">
          <span class="feature-icon" aria-hidden="true">📏</span>
          <span class="feature-label">Progress</span>
        </button>
      </div>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <span>Powered by W3C COGA Guidelines + Gemini AI</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
